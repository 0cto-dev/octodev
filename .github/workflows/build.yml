name: "Build OctoDev Optimized"

on:
  push:
    branches:
      - main

jobs:
  publish-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install dependencies (ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: build android apk
        run: npx tauri android build --debug
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Sign APK Manually
        run: |
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" | head -n 1)
          
          echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          
          BUILD_TOOL_PATH=$(ls -d ${ANDROID_HOME}/build-tools/* | tail -1)
          
          $BUILD_TOOL_PATH/zipalign -v 4 "$APK_PATH" OctoDev-Aligned.apk
          
          $BUILD_TOOL_PATH/apksigner sign --ks release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASS }}" \
            --out OctoDev-Official.apk OctoDev-Aligned.apk

      - name: upload official apk
        uses: actions/upload-artifact@v4
        with:
          name: OctoDev-Official
          path: OctoDev-Official.apk